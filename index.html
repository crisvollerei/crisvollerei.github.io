<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>清蒸排班表</title>
  <style>
    /* ===== Google Fonts ===== */
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');

    :root {
      /* Dark Theme (Default) */
      --bg: #0d1117;
      --bg-card: #161b22;
      --bg-cell: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #7d8590;
      --accent: #f0883e;
      --accent-glow: rgba(240, 136, 62, 0.15);
      --day-color: #58a6ff;
      --night-color: #a371f7;
      --rest-color: #3fb950;
      --today-bg: rgba(240, 136, 62, 0.08);
      --today-border: #f0883e;
      --avatar-bg: linear-gradient(135deg, #f0883e, #a371f7);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
      
      /* Shift-based background colors */
      --shift-bg-day: #0f172a;
      --shift-bg-night: #1e1b4b;
      --shift-bg-rest: #1a2e1a;
    }

    [data-theme="light"] {
      --bg: #f6f8fa;
      --bg-card: #ffffff;
      --bg-cell: #f3f4f6;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #656d76;
      --accent: #d55f0a;
      --accent-glow: rgba(213, 95, 10, 0.12);
      --day-color: #0969da;
      --night-color: #8250df;
      --rest-color: #1a7f37;
      --today-bg: rgba(213, 95, 10, 0.08);
      --today-border: #d55f0a;
      --avatar-bg: linear-gradient(135deg, #d55f0a, #8250df);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
      
      /* Light theme shift backgrounds */
      --shift-bg-day: #e0f2fe;
      --shift-bg-night: #ede9fe;
      --shift-bg-rest: #dcfce7;
    }

    [data-shift="day"] { background: linear-gradient(135deg, var(--shift-bg-day), var(--bg)); }
    [data-shift="night"] { background: linear-gradient(135deg, var(--shift-bg-night), var(--bg)); }
    [data-shift="rest"] { background: linear-gradient(135deg, var(--shift-bg-rest), var(--bg)); }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 120px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, var(--accent-glow) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 60%, rgba(88, 166, 255, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    /* ===== Theme Toggle ===== */
    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-md);
      transition: all 0.2s ease;
      z-index: 100;
    }

    .theme-toggle:hover {
      transform: scale(1.1);
      border-color: var(--accent);
    }

    .theme-toggle:active {
      transform: scale(0.95);
    }

    /* ===== Back to Today Button ===== */
    .back-to-today {
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      border: none;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-md);
      transition: all 0.2s ease;
      z-index: 100;
    }

    .back-to-today:hover {
      transform: scale(1.1);
      background: var(--accent);
    }

    .back-to-today:active {
      transform: scale(0.95);
    }

    /* ===== Header ===== */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .avatar-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 16px 6px 8px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--avatar-bg);     
      position: relative;               
      overflow: hidden;                 
      flex-shrink: 0;
      display: flex;                    
      align-items: center;
      justify-content: center;
    }

    .avatar img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 2;                       
      border-radius: 50%;               
    }

    .avatar-fallback {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: white;
      background: var(--avatar-bg);    
      z-index: 1;                      
      border-radius: 50%;
    }
    .badge-text {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .badge-text strong {
      color: var(--accent);
      font-weight: 600;
    }

    h1 {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      background: linear-gradient(135deg, var(--text) 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ===== Legend ===== */
    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-dot.day { background: var(--day-color); }
    .legend-dot.night { background: var(--night-color); }
    .legend-dot.rest { background: var(--rest-color); }

    /* ===== Today Card ===== */
    .today-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: slideUp 0.6s ease-out;
      box-shadow: var(--shadow-md);
      transition: all 0.3s ease;
    }

    .today-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--day-color), var(--night-color), var(--rest-color));
      border-radius: 20px 20px 0 0;
    }

    .today-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .today-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .today-shift {
      font-size: 42px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
    }

    .today-shift.day { color: var(--day-color); }
    .today-shift.night { color: var(--night-color); }
    .today-shift.rest { color: var(--rest-color); }

    .today-shift-emoji {
      font-size: 36px;
      display: block;
      margin-bottom: 8px;
    }

    .today-cycle {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .today-cycle span {
      color: var(--accent);
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ===== Cycle Progress Bar ===== */
    .cycle-progress {
      width: 100%;
      height: 8px;
      background: var(--bg-cell);
      border-radius: 4px;
      overflow: hidden;
      margin: 12px 0;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--day-color), var(--night-color));
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    /* ===== Next Shift Info ===== */
    .next-shift-info {
      background: var(--bg-cell);
      border-radius: 12px;
      padding: 12px;
      margin-top: 12px;
      font-size: 13px;
    }

    .next-shift-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .next-shift-item:last-child {
      margin-bottom: 0;
    }

    .next-shift-day { color: var(--day-color); }
    .next-shift-night { color: var(--night-color); }
    .next-shift-rest { color: var(--rest-color); }

    /* ===== 实时时钟与倒计时 ===== */
    .live-clock {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      margin: 12px 0 8px;
      letter-spacing: 2px;
    }

    .countdown-container {
      display: flex;
      justify-content: space-around;
      margin-top: 8px;
      padding: 8px 0;
      border-top: 1px dashed var(--border);
    }

    .countdown-item {
      text-align: center;
    }

    .countdown-label {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .countdown-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    /* ===== Month Nav ===== */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }

    .nav-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s;
      flex-shrink: 0;
      box-shadow: var(--shadow-sm);
    }

    .nav-btn:hover {
      background: var(--bg-cell);
      border-color: var(--accent);
      color: var(--accent);
    }

    .nav-btn:active {
      transform: scale(0.95);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .nav-btn:disabled:hover {
      background: var(--bg-card);
      border-color: var(--border);
      color: var(--text);
    }

    .month-title {
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      flex: 1;
    }

    /* ===== Calendar Grid ===== */
    .calendar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      transition: all 0.3s ease;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--bg-cell);
      border-bottom: 1px solid var(--border);
    }

    .weekday {
      text-align: center;
      padding: 10px 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .weekday.weekend { color: var(--night-color); }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 8px;
      gap: 4px;
    }

    .day-cell {
      aspect-ratio: 1;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      font-size: 15px;
      font-weight: 600;
      cursor: default;
      transition: all 0.2s;
      position: relative;
      min-height: 44px;
    }

    .day-cell.empty {
      background: transparent;
      cursor: default;
    }

    .day-cell.past {
      color: var(--text-muted);
      opacity: 0.5;
    }

    .day-cell:not(.past):not(.today):not(.empty) {
      background: var(--bg-cell);
      cursor: pointer;
    }

    .day-cell:not(.past):not(.today):not(.empty):hover {
      background: var(--border);
      transform: scale(1.08);
    }

    .day-cell.today {
      background: var(--today-bg) !important;
      border: 1.5px solid var(--today-border);
      box-shadow: 0 0 16px var(--accent-glow);
      animation: pulse-border 2s ease-in-out infinite;
    }

    .day-cell .day-num {
      line-height: 1;
    }

    .day-cell .shift-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .shift-dot.day { background: var(--day-color); }
    .shift-dot.night { background: var(--night-color); }
    .shift-dot.rest { background: var(--rest-color); }

    .day-cell.today .day-num {
      color: var(--accent);
    }

    /* ===== Festival Marker ===== */
    .festival-marker {
      position: absolute;
      top: 2px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 8px;
      color: var(--accent);
      font-weight: bold;
    }

    /* ===== Detail Panel ===== */
    .detail-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
      display: none;
      animation: slideUp 0.3s ease-out;
      box-shadow: var(--shadow-md);
    }

    .detail-panel.show { display: block; }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .detail-date {
      font-size: 14px;
      font-weight: 600;
    }

    .detail-close {
      background: var(--bg-cell);
      border: none;
      border-radius: 8px;
      color: var(--text-muted);
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .detail-close:hover { background: var(--border); color: var(--text); }

    .detail-shift {
      font-size: 36px;
      font-weight: 900;
      text-align: center;
      padding: 16px 0;
    }

    .detail-shift.day { color: var(--day-color); }
    .detail-shift.night { color: var(--night-color); }
    .detail-shift.rest { color: var(--rest-color); }

    .detail-cycle {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }

    .detail-cycle span { color: var(--accent); font-weight: 600; font-family: 'JetBrains Mono', monospace; }

    /* ===== Settings Modal ===== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.show { display: flex; }

    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      box-shadow: var(--shadow-md);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
    }

    .modal-close {
      background: var(--bg-cell);
      border: none;
      border-radius: 8px;
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .modal-close:hover { background: var(--border); color: var(--text); }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-cell);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
    }

    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-cell);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      resize: vertical;
      min-height: 100px;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-secondary {
      background: var(--bg-cell);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn:hover {
      opacity: 0.9;
    }

    /* ===== Animations ===== */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 12px var(--accent-glow); }
      50% { box-shadow: 0 0 22px rgba(240, 136, 62, 0.3); }
    }

    /* ===== Footer ===== */
    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .footer-hint {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      display: inline-block;
      box-shadow: var(--shadow-sm);
      margin-bottom: 12px;
    }

    .settings-btn {
      background: var(--bg-cell);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 16px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .settings-btn:hover {
      background: var(--border);
      color: var(--text);
    }

    /* ===== Responsive ===== */
    @media (min-width: 480px) {
      body { padding: 40px 20px 120px; }
      .calendar, .today-card { max-width: 440px; margin: 0 auto 32px; }
    }
  </style>
</head>
<body>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>

  <!-- Back to Today Button -->
  <button class="back-to-today" id="backToToday" title="回到今天">📅</button>

  <!-- Header -->
  <div class="header">
    <div class="avatar-badge">
      <div class="avatar">
        <img src="avatar.png" alt="清蒸" onerror="this.style.display='none'">
        <div class="avatar-fallback">清</div>
      </div>
      <span class="badge-text"><strong>清蒸</strong> 的排班表</span>
    </div>
    <h1>清蒸排班</h1>
    <div class="subtitle" id="subtitle"></div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot day"></div>白班</div>
    <div class="legend-item"><div class="legend-dot night"></div>夜班</div>
    <div class="legend-item"><div class="legend-dot rest"></div>休息</div>
  </div>

  <!-- Today Card -->
  <div class="today-card">
    <div class="today-label">今日班次</div>
    <div class="today-date" id="todayDate"></div>
    <div class="today-shift" id="todayShift"></div>
    <div class="today-cycle">本周期第 <span id="todayCycle"></span> 天</div>
    
    <!-- Cycle Progress Bar -->
    <div class="cycle-progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    
    <!-- Next Shift Info -->
    <div class="next-shift-info">
      <div class="next-shift-item">
        <span>距离下次白班:</span>
        <span id="nextDayInfo" class="next-shift-day">-</span>
      </div>
      <div class="next-shift-item">
        <span>距离下次夜班:</span>
        <span id="nextNightInfo" class="next-shift-night">-</span>
      </div>
    </div>

    <!-- 实时时钟 -->
    <div class="live-clock" id="liveClock">--:--:--</div>

    <!-- 上下班倒计时 -->
    <div class="countdown-container">
      <div class="countdown-item">
        <span class="countdown-label">距离上班</span>
        <span class="countdown-value" id="countdownToWork">--:--:--</span>
      </div>
      <div class="countdown-item">
        <span class="countdown-label">距离下班</span>
        <span class="countdown-value" id="countdownToOff">--:--:--</span>
      </div>
    </div>
  </div>

  <!-- Month Nav -->
  <div class="month-nav">
    <button class="nav-btn" id="prevBtn" onclick="prevMonth()">&#8592;</button>
    <div class="month-title" id="monthTitle"></div>
    <button class="nav-btn" id="nextBtn" onclick="nextMonth()">&#8594;</button>
  </div>

  <!-- Calendar -->
  <div class="calendar">
    <div class="weekdays">
      <div class="weekday">一</div>
      <div class="weekday">二</div>
      <div class="weekday">三</div>
      <div class="weekday">四</div>
      <div class="weekday">五</div>
      <div class="weekday weekend">六</div>
      <div class="weekday weekend">日</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>

  <!-- Detail Panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <div class="detail-date" id="detailDate"></div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-shift" id="detailShift"></div>
    <div class="detail-cycle">本周期第 <span id="detailCycle"></span> 天</div>
  </div>

  <!-- Settings Modal -->
  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title">排班设置</div>
        <button class="modal-close" onclick="closeSettings()">✕</button>
      </div>
      <div class="form-group">
        <label for="anchorDate">锚定日期</label>
        <input type="date" id="anchorDate" value="2026-04-18">
      </div>
      <div class="form-group">
        <label for="cyclePattern">周期模式 (用空格分隔)</label>
        <textarea id="cyclePattern">白班 夜班 休息 白班 夜班 休息 休息 休息</textarea>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary" onclick="closeSettings()">取消</button>
        <button class="btn btn-primary" onclick="saveSettings()">保存</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-hint">
      💡 点击任意日期可查看详情<br>
      周期：白 夜 休 白 夜 休 休 休
    </div>
    <div class="settings-btn" onclick="openSettings()">⚙️ 排班设置</div>
  </div>

  <script>
    // ===== Config =====
    let CYCLE = JSON.parse(localStorage.getItem('qingzheng-cycle')) || ['白班', '夜班', '休息', '白班', '夜班', '休息', '休息', '休息'];
    let ANCHOR_DATE = new Date(localStorage.getItem('qingzheng-anchor') || '2026-04-18');

    // Festival data
    const FESTIVALS = {
      // 2025年节假日
      '2025-01-01': '元旦',
      '2025-01-29': '除夕',
      '2025-01-30': '春节',
      '2025-01-31': '春节',
      '2025-02-01': '春节',
      '2025-02-02': '春节',
      '2025-02-03': '春节',
      '2025-02-04': '春节',
      '2025-04-05': '清明节',
      '2025-05-01': '劳动节',
      '2025-05-02': '劳动节',
      '2025-05-03': '劳动节',
      '2025-05-04': '劳动节',
      '2025-05-05': '劳动节',
      '2025-05-31': '端午节',
      '2025-10-01': '国庆节',
      '2025-10-02': '国庆节',
      '2025-10-03': '国庆节',
      '2025-10-04': '国庆节',
      '2025-10-05': '国庆节',
      '2025-10-06': '中秋节',
      '2025-10-07': '国庆节',

      // 2026年节假日
      '2026-01-01': '元旦',
      '2026-02-16': '除夕',
      '2026-02-17': '春节',
      '2026-02-18': '春节',
      '2026-02-19': '春节',
      '2026-02-20': '春节',
      '2026-02-21': '春节',
      '2026-02-22': '春节',
      '2026-04-05': '清明节',
      '2026-05-01': '劳动节',
      '2026-05-02': '劳动节',
      '2026-05-03': '劳动节',
      '2026-05-04': '劳动节',
      '2026-05-05': '劳动节',
      '2026-06-19': '端午节',
      '2026-09-25': '中秋节',
      '2026-10-01': '国庆节',
      '2026-10-02': '国庆节',
      '2026-10-03': '国庆节',
      '2026-10-04': '国庆节',
      '2026-10-05': '国庆节',
      '2026-10-06': '国庆节',
      '2026-10-07': '国庆节'
    };

    // ===== Theme =====
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('qingzheng-theme');
    if (savedTheme) {
      document.documentElement.setAttribute('data-theme', savedTheme);
      themeToggle.textContent = savedTheme === 'light' ? '☀️' : '🌙';
    }

    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('qingzheng-theme', next);
      themeToggle.textContent = next === 'light' ? '☀️' : '🌙';
    });

    // ===== State =====
    let viewYear, viewMonth;
    let selectedDate = null;

    // ===== Init =====
    (function init() {
      const today = new Date();
      viewYear = today.getFullYear();
      viewMonth = today.getMonth();
      render();
      // 启动实时时钟更新
      updateLiveClockAndCountdown();
      setInterval(updateLiveClockAndCountdown, 1000);
    })();

    function getCycleIndex(date) {
      const diff = Math.round((date - ANCHOR_DATE) / (1000 * 60 * 60 * 24));
      return ((diff % CYCLE.length) + CYCLE.length) % CYCLE.length;
    }

    function getShift(date) {
      return CYCLE[getCycleIndex(date)];
    }

    // ===== 班次时间计算 (白班 8:00-20:00 / 夜班 20:00-次日8:00) =====
    function getShiftTimes(date) {
      const year = date.getFullYear();
      const month = date.getMonth();
      const day = date.getDate();
      
      // 白班：当日 8:00 - 20:00
      const dayStart = new Date(year, month, day, 8, 0, 0);
      const dayEnd = new Date(year, month, day, 20, 0, 0);
      
      // 夜班：当日 20:00 - 次日 8:00
      const nightStart = new Date(year, month, day, 20, 0, 0);
      const nightEnd = new Date(year, month, day + 1, 8, 0, 0);
      
      const shift = getShift(date);
      
      if (shift === '白班') {
        return { start: dayStart, end: dayEnd };
      } else if (shift === '夜班') {
        return { start: nightStart, end: nightEnd };
      } else {
        return null; // 休息
      }
    }

    // 格式化倒计时 (毫秒 → HH:MM:SS)
    function formatCountdown(ms) {
      if (ms <= 0) return '00:00:00';
      const totalSeconds = Math.floor(ms / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    // 计算距离下一个班次上班的时间（用于休息日）
    function getNextWorkCountdown(now) {
      for (let i = 0; i < 14; i++) {
        const checkDate = new Date(now);
        checkDate.setDate(checkDate.getDate() + i);
        const shift = getShift(checkDate);
        if (shift !== '休息') {
          const times = getShiftTimes(checkDate);
          if (times && times.start > now) {
            return times.start - now;
          }
        }
      }
      return null;
    }

    // 更新实时时钟和倒计时
    function updateLiveClockAndCountdown() {
      const now = new Date();
      
      // 1. 实时时钟
      const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
      document.getElementById('liveClock').textContent = timeStr;
      
      // 2. 今日班次倒计时
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const shift = getShift(today);
      const times = getShiftTimes(today);
      
      const workEl = document.getElementById('countdownToWork');
      const offEl = document.getElementById('countdownToOff');
      
      if (shift === '休息') {
        const nextWorkMs = getNextWorkCountdown(now);
        if (nextWorkMs !== null) {
          workEl.textContent = formatCountdown(nextWorkMs);
        } else {
          workEl.textContent = '--:--:--';
        }
        offEl.textContent = '今日休息';
        offEl.style.fontSize = '13px';
        offEl.style.fontWeight = '400';
      } else {
        const start = times.start;
        const end = times.end;
        
        // 距离上班
        if (now < start) {
          workEl.textContent = formatCountdown(start - now);
        } else {
          workEl.textContent = '已上班';
        }
        
        // 距离下班
        if (now < end) {
          offEl.textContent = formatCountdown(end - now);
        } else {
          offEl.textContent = '已下班';
        }
        
        offEl.style.fontSize = '';
        offEl.style.fontWeight = '';
      }
    }

    function getWeekdayCn(date) {
      return ['周日','周一','周二','周三','周四','周五','周六'][date.getDay()];
    }

    function formatDate(date) {
      return `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日`;
    }

    function formatDateISO(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function isSameDay(a, b) {
      return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
    }

    function isToday(date) {
      return isSameDay(date, new Date());
    }

    function isPast(date) {
      const today = new Date();
      today.setHours(0,0,0,0);
      return date < today;
    }

    // Calculate next shifts
    function calculateNextShifts() {
      const today = new Date();
      today.setHours(0,0,0,0);
      
      let nextDayDays = -1;
      let nextNightDays = -1;
      
      for (let i = 1; i <= 30; i++) {
        const futureDate = new Date(today);
        futureDate.setDate(futureDate.getDate() + i);
        
        if (nextDayDays === -1 && getShift(futureDate) === '白班') {
          nextDayDays = i;
        }
        
        if (nextNightDays === -1 && getShift(futureDate) === '夜班') {
          nextNightDays = i;
        }
        
        if (nextDayDays !== -1 && nextNightDays !== -1) break;
      }
      
      return { nextDay: nextDayDays, nextNight: nextNightDays };
    }

    // Update background based on today's shift
    function updateBackgroundShift() {
      const today = new Date();
      const shift = getShift(today);
      const shiftClass = shift === '白班' ? 'day' : shift === '夜班' ? 'night' : 'rest';
      document.body.setAttribute('data-shift', shiftClass);
    }

    // ===== Render =====
    function render() {
      const today = new Date();
      updateBackgroundShift();

      // Subtitle
      document.getElementById('subtitle').textContent =
        `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日 ${getWeekdayCn(today)}`;

      // Today card
      document.getElementById('todayDate').textContent = formatDate(today) + ' ' + getWeekdayCn(today);
      const shift = getShift(today);
      const shiftMap = { '白班': ['day','☀️'], '夜班': ['night','🌙'], '休息': ['rest','🏖️'] };
      const [cls, emoji] = shiftMap[shift];
      const td = document.getElementById('todayShift');
      td.innerHTML = `<span class="today-shift-emoji">${emoji}</span>${shift}`;
      td.className = `today-shift ${cls}`;
      document.getElementById('todayCycle').textContent = getCycleIndex(today) + 1;
      
      // Progress bar
      const progress = (getCycleIndex(today) + 1) / CYCLE.length * 100;
      document.getElementById('progressBar').style.width = `${progress}%`;

      // Next shift info
      const nextShifts = calculateNextShifts();
      document.getElementById('nextDayInfo').textContent = nextShifts.nextDay === -1 ? 'N/A' : `${nextShifts.nextDay}天`;
      document.getElementById('nextNightInfo').textContent = nextShifts.nextNight === -1 ? 'N/A' : `${nextShifts.nextNight}天`;

      // Month title
      document.getElementById('monthTitle').textContent = `${viewYear}年${viewMonth+1}月`;

      // Nav buttons
      const minYear = today.getFullYear() - 1;
      const maxYear = today.getFullYear() + 1;
      document.getElementById('prevBtn').disabled = (viewYear === minYear && viewMonth === 0);
      document.getElementById('nextBtn').disabled = (viewYear === maxYear && viewMonth === 11);

      // Calendar
      const grid = document.getElementById('daysGrid');
      grid.innerHTML = '';

      const firstDay = new Date(viewYear, viewMonth, 1);
      const startDow = (firstDay.getDay() + 6) % 7;
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

      // Empty cells before
      for (let i = 0; i < startDow; i++) {
        grid.appendChild(mk('div', { cls: 'day-cell empty' }));
      }

      // Day cells
      for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(viewYear, viewMonth, d);
        const s = getShift(date);
        const [cls] = { '白班': ['day'], '夜班': ['night'], '休息': ['rest'] }[s];
        const past = isPast(date) && !isToday(date);
        const todayCls = isToday(date) ? ' today' : '';
        const pastCls = past ? ' past' : '';

        const cell = mk('div', {
          cls: `day-cell${todayCls}${pastCls}`,
          onclick: () => showDetail(date)
        });

        // Add festival marker if exists
        const dateStr = formatDateISO(date);
        if (FESTIVALS[dateStr]) {
          const festivalMarker = mk('div', { cls: 'festival-marker', text: FESTIVALS[dateStr].substring(0, 2) });
          cell.appendChild(festivalMarker);
        }

        const dot = mk('div', { cls: `shift-dot ${cls}` });
        const num = mk('div', { cls: 'day-num', text: d });

        cell.appendChild(dot);
        cell.appendChild(num);
        grid.appendChild(cell);
      }

      // 每次渲染后刷新一次倒计时（保证切换月份后依然准确）
      updateLiveClockAndCountdown();
    }

    function mk(tag, opts) {
      const el = document.createElement(tag);
      if (opts.cls) el.className = opts.cls;
      if (opts.text) el.textContent = opts.text;
      if (opts.onclick) el.onclick = opts.onclick;
      if (opts.html) el.innerHTML = opts.html;
      return el;
    }

    // ===== Detail Panel =====
    function showDetail(date) {
      const s = getShift(date);
      const [cls] = { '白班': ['day'], '夜班': ['night'], '休息': ['rest'] }[s];
      const emoji = { '白班': '☀️', '夜班': '🌙', '休息': '🏖️' }[s];
      const panel = document.getElementById('detailPanel');

      document.getElementById('detailDate').textContent = formatDate(date) + ' ' + getWeekdayCn(date);
      const ds = document.getElementById('detailShift');
      ds.innerHTML = `${emoji} ${s}`;
      ds.className = `detail-shift ${cls}`;
      document.getElementById('detailCycle').textContent = getCycleIndex(date) + 1;

      panel.classList.add('show');
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      selectedDate = date;
    }

    function closeDetail() {
      document.getElementById('detailPanel').classList.remove('show');
      selectedDate = null;
    }

    // ===== Month Navigation =====
    function prevMonth() {
      if (viewMonth === 0) { viewYear--; viewMonth = 11; }
      else viewMonth--;
      closeDetail();
      render();
    }

    function nextMonth() {
      if (viewMonth === 11) { viewYear++; viewMonth = 0; }
      else viewMonth++;
      closeDetail();
      render();
    }

    // ===== Back to Today =====
    document.getElementById('backToToday').addEventListener('click', () => {
      const today = new Date();
      viewYear = today.getFullYear();
      viewMonth = today.getMonth();
      closeDetail();
      render();
    });

    // ===== Settings =====
    function openSettings() {
      document.getElementById('settingsModal').classList.add('show');
      document.getElementById('anchorDate').value = formatDateISO(ANCHOR_DATE);
      document.getElementById('cyclePattern').value = CYCLE.join(' ');
    }

    function closeSettings() {
      document.getElementById('settingsModal').classList.remove('show');
    }

    function saveSettings() {
      const newAnchor = new Date(document.getElementById('anchorDate').value);
      const newCycle = document.getElementById('cyclePattern').value.split(/\s+/).filter(s => s.trim() !== '');
      
      if (newCycle.length === 0) {
        alert('周期模式不能为空！');
        return;
      }
      
      ANCHOR_DATE = newAnchor;
      CYCLE = newCycle;
      
      localStorage.setItem('qingzheng-anchor', ANCHOR_DATE.toISOString().split('T')[0]);
      localStorage.setItem('qingzheng-cycle', JSON.stringify(CYCLE));
      
      closeSettings();
      render();
    }
  </script>
</body>
</html>
